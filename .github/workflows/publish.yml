name: Publish

on:
  push:
    branches: [main]

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - run: pnpm -r build

      - name: Publish packages with version changes
        run: |
          publish_package() {
            local dir=$1
            local pkg_name
            local local_version
            local published_version

            pkg_name=$(node -p "require('./$dir/package.json').name")
            local_version=$(node -p "require('./$dir/package.json').version")
            is_private=$(node -p "require('./$dir/package.json').private || false")

            if [ "$is_private" = "true" ]; then
              echo "Skipping $pkg_name (private)"
              return
            fi

            published_version=$(pnpm view "$pkg_name" version 2>/dev/null || echo "")

            if [ "$local_version" = "$published_version" ]; then
              echo "Skipping $pkg_name@$local_version (already published)"
            else
              echo "Publishing $pkg_name@$local_version (registry has ${published_version:-nothing})"
              pnpm publish "$dir" --provenance --access public
            fi
          }

          publish_package packages/core
          publish_package packages/db-adapters/postgres
          publish_package packages/db-adapters/mysql
          publish_package packages/framework-adapters/express
          publish_package packages/framework-adapters/fastify
          publish_package packages/framework-adapters/hono
          publish_package packages/openfeature-provider-server
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
